<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineFlow - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="assets/flow-theme.css" rel="stylesheet">
</head>
<body class="bg-dark">
    <nav class="navbar navbar-expand-lg navbar-dark navbar-flow py-3">
        <div class="container">
            <a class="navbar-brand fw-bold fs-3 text-gold" href="index.html">
                <i class="bi bi-camera-reels"></i> CineFlow
            </a>
            <div class="collapse navbar-collapse" id="mainNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link active" href="index.html">Início</a></li>
                    <li class="nav-item"><a class="nav-link" href="acervo.html">Filmes</a></li>
                    <li class="nav-item"><a class="nav-link" href="salas.html">Salas</a></li>
                    <li class="nav-item"><a class="nav-link" href="programacao.html">Agenda</a></li>
                    <li class="nav-item"><a class="nav-link" href="vendas.html">Vendas</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <section class="hero-cine text-center py-5">
        <div class="container">
            <h1 class="display-4 fw-bold text-white">Gestão <span class="text-gold">CineFlow</span></h1>
            <p class="lead text-secondary">Controle total da sua operação cinematográfica</p>
        </div>
    </section>

    <div class="container pb-5">
        <div class="row g-4 text-center">
            <div class="col-md-3">
                <div class="card bg-flow-card p-4">
                    <h3 class="stat-number" id="statFilms">0</h3>
                    <p class="text-muted mb-0">Filmes no Acervo</p>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card bg-flow-card p-4">
                    <h3 class="stat-number" id="statRooms">0</h3>
                    <p class="text-muted mb-0">Salas Ativas</p>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card bg-flow-card p-4">
                    <h3 class="stat-number" id="statShows">0</h3>
                    <p class="text-muted mb-0">Sessões Marcadas</p>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card bg-flow-card p-4">
                    <h3 class="stat-number" id="statTickets">0</h3>
                    <p class="text-muted mb-0">Ingressos Vendidos</p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="scripts/flow-core.js"></script>
    <script src="scripts/flow-dashboard.js"></script>
</body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom border-warning">
    <div class="container">
        <a class="navbar-brand fw-bold text-warning" href="index.html">CineFlow</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="index.html">Início</a>
            <a class="nav-link" href="acervo.html">Filmes</a>
            <a class="nav-link" href="vendas.html">Vendas</a>
        </div>
    </div>
</nav>
</html>
