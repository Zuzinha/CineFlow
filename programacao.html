<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineFlow - Programação</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="assets/flow-theme.css" rel="stylesheet">
</head>
<body class="bg-dark text-white">
    <div class="container py-5">
        <a href="index.html" class="btn btn-outline-warning mb-4">← Voltar ao Painel</a>

        <div class="row">
            <div class="col-lg-4">
                <div class="card bg-flow-card p-4 mb-4">
                    <h4 class="text-gold mb-4"><i class="bi bi-calendar-event"></i> Agendar Sessão</h4>
                    <form id="sessionForm">
                        <div class="mb-3">
                            <label class="form-label small fw-bold">FILME</label>
                            <select class="form-select bg-dark text-white border-secondary" id="filmSelect" required></select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold">SALA</label>
                            <select class="form-select bg-dark text-white border-secondary" id="roomSelect" required></select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold">DATA / HORA</label>
                            <input type="datetime-local" class="form-control bg-dark text-white border-secondary" id="datetime" required>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label small fw-bold">PREÇO (R$)</label>
                                <input type="number" step="0.01" class="form-control bg-dark text-white border-secondary" id="price" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label small fw-bold">ÁUDIO</label>
                                <select class="form-select bg-dark text-white border-secondary" id="audio" required>
                                    <option value="Dublado">Dublado</option>
                                    <option value="Legendado">Legendado</option>
                                </select>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-gold w-100">PUBLICAR NA GRADE</button>
                    </form>
                </div>
            </div>
            <div class="col-lg-8">
                <div class="card bg-flow-card p-4 text-white">
                    <h4 class="mb-4">Grade de Programação</h4>
                    <table class="table table-flow align-middle">
                        <thead>
                            <tr>
                                <th>Filme</th>
                                <th>Horário</th>
                                <th>Preço</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="sessionList">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="scripts/flow-core.js"></script>
    <script src="scripts/flow-schedule.js"></script>
</body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom border-warning">
    <div class="container">
        <a class="navbar-brand fw-bold text-warning" href="index.html">CineFlow</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="index.html">Início</a>
            <a class="nav-link" href="acervo.html">Filmes</a>
            <a class="nav-link" href="vendas.html">Vendas</a>
        </div>
    </div>
</nav>
</html>
