<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineFlow - Salas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="assets/flow-theme.css" rel="stylesheet">
</head>
<body class="bg-dark text-white">
    <div class="container py-5">
        <a href="index.html" class="btn btn-outline-warning mb-4">← Voltar ao Painel</a>

        <div class="row">
            <div class="col-lg-4">
                <div class="card bg-flow-card p-4 mb-4">
                    <h4 class="text-gold mb-4"><i class="bi bi-door-open"></i> Configurar Sala</h4>
                    <form id="roomForm">
                        <div class="mb-3">
                            <label class="form-label small fw-bold">NOME DA SALA</label>
                            <input type="text" class="form-control bg-dark text-white border-secondary" id="roomName" placeholder="Ex: Sala 01 IMAX" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold">CAPACIDADE</label>
                            <input type="number" class="form-control bg-dark text-white border-secondary" id="capacity" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label small fw-bold">TECNOLOGIA</label>
                            <select class="form-select bg-dark text-white border-secondary" id="roomType" required>
                                <option value="2D">2D Convencional</option>
                                <option value="3D">3D Digital</option>
                                <option value="IMAX">IMAX Experience</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-gold w-100" id="saveRoomButton">SALVAR SALA</button>
                        <button type="button" class="btn btn-secondary w-100 mt-2" id="cancelRoomButton" style="display:none;">CANCELAR EDIÇÃO</button>
                    </form>
                </div>
            </div>
            <div class="col-lg-8">
                <div class="card bg-flow-card p-4">
                    <div class="d-flex justify-content-between mb-4">
                        <h4 class="mb-0">Salas Ativas</h4>
                        <span class="badge border border-gold text-gold" id="roomCounter">0</span>
                    </div>
                    <div class="row" id="roomGrid">
                        </div>
                </div>
            </div>
        </div>
    </div>

    <script src="scripts/flow-core.js"></script>
    <script src="scripts/flow-rooms.js"></script>
</body>

</html>
