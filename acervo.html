<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="assets/flow-theme.css" rel="stylesheet">
</head>
<body class="bg-dark text-white">
    <div class="container py-5">
        <a href="index.html" class="btn btn-outline-warning mb-4">← Voltar ao Início</a>
        
        <div class="row">
            <div class="col-lg-5">
                <div class="card bg-flow-card p-4">
                    <h4 class="text-gold mb-4">Novo Filme</h4>
                    <form id="filmForm">
                        <div class="mb-3">
                            <label class="form-label">TÍTULO</label>
                            <input type="text" class="form-control bg-dark text-white border-secondary" id="title" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">GÊNERO</label>
                            <input type="text" class="form-control bg-dark text-white border-secondary" id="genre" required>
                        </div>
                        <div class="row">
                            <div class="col-6 mb-3">
                                <label class="form-label">MINUTOS</label>
                                <input type="number" class="form-control bg-dark text-white border-secondary" id="duration" required>
                            </div>
                            <div class="col-6 mb-3">
                                <label class="form-label">CLASSIFICAÇÃO</label>
                               <select class="form-select bg-dark text-white border-secondary" id="rating">
                                <option value="Livre">Livre</option>
                                <option value="12 anos">12 anos</option>
                                <option value="16 anos">16 anos</option>
                                <option value="18 anos">18 anos</option>
                               </select>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-gold w-100">ADICIONAR AO FLUXO</button>
                    </form>
                </div>
            </div>
            <div class="col-lg-7">
                <div class="card bg-flow-card p-4">
                    <div class="d-flex justify-content-between mb-3">
                        <h5>Filmes Cadastrados</h5>
                        <span class="badge btn-gold" id="filmCounter">0</span>
                    </div>
                    <table class="table table-flow">
                        <thead><tr><th>Título</th><th>Gênero</th><th>Class.</th><th>Min</th><th></th></tr></thead>
                        <tbody id="filmList"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    <script src="scripts/flow-core.js"></script>
    <script src="scripts/flow-movies.js"></script>
</body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom border-warning">
    <div class="container">
        <a class="navbar-brand fw-bold text-warning" href="index.html">CineFlow</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="index.html">Início</a>
            <a class="nav-link" href="acervo.html">Filmes</a>
            <a class="nav-link" href="vendas.html">Vendas</a>
        </div>
    </div>
</nav>
</html>
