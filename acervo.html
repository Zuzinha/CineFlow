<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineFlow - Acervo de Filmes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="assets/flow-theme.css" rel="stylesheet">
</head>
<body class="bg-dark text-white">

    <div class="container py-5">
        <a href="index.html" class="btn btn-outline-warning mb-4">← Voltar ao Painel</a>

        <div class="row">
            <div class="col-lg-5 mb-4">
                <div class="card bg-flow-card p-4 border-secondary">
                    <h4 class="text-gold mb-4">Novo Filme</h4>
                    <form id="filmForm">
                        <div class="mb-3">
                            <label class="form-label small fw-bold">TÍTULO</label>
                            <input type="text" class="form-control bg-dark text-white border-secondary" id="title" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold">GÊNERO</label>
                            <input type="text" class="form-control bg-dark text-white border-secondary" id="genre" required>
                        </div>
                        <div class="row">
                            <div class="col-6 mb-3">
                                <label class="form-label small fw-bold">DURAÇÃO (MIN)</label>
                                <input type="number" class="form-control bg-dark text-white border-secondary" id="duration" required>
                            </div>
                            <div class="col-6 mb-3">
                                <label class="form-label small fw-bold">CLASSIFICAÇÃO</label>
                                <select class="form-select bg-dark text-white border-secondary" id="rating">
                                    <option value="Livre">Livre</option>
                                    <option value="12 anos">12 anos</option>
                                    <option value="16 anos">16 anos</option>
                                    <option value="18 anos">18 anos</option>
                                </select>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-warning w-100 fw-bold" id="saveButton">ADICIONAR AO FLUXO</button>
                        <button type="button" class="btn btn-secondary w-100 fw-bold mt-2" id="cancelEditButton" style="display:none;">CANCELAR EDIÇÃO</button>
                    </form>
                </div>
            </div>

            <div class="col-lg-7">
                <div class="card bg-flow-card p-4 border-secondary">
                    <div class="d-flex justify-content-between mb-3">
                        <h5 class="text-white">Filmes Cadastrados</h5>
                        <span class="badge bg-warning text-dark" id="filmCounter">0</span>
                    </div>
                    <div class="table-responsive">
                        <table class="table table-dark table-hover">
                            <thead>
                                <tr>
                                    <th>Título</th>
                                    <th>Gênero</th>
                                    <th>Class.</th>
                                    <th>Min</th>
                                    <th></th>
                                </tr>
                            </thead>
                            <tbody id="filmList"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="scripts/flow-core.js"></script>
    <script src="scripts/flow-movies.js"></script>
</body>
</html>
