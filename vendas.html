<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="assets/flow-theme.css" rel="stylesheet">
</head>
<body class="bg-dark text-white">
    <div class="container py-5">
        <a href="index.html" class="btn btn-outline-warning mb-4">← Voltar ao Início</a>
        
        <div class="row">
            <div class="col-lg-5">
                <div class="card bg-flow-card p-4">
                    <h4 class="text-gold mb-4">Emitir Ingresso</h4>
                    <form id="saleForm">
                        <div class="mb-3">
                            <label class="form-label">SESSÃO</label>
                            <select class="form-select bg-dark text-white border-secondary" id="sessionSelect" required></select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">CLIENTE</label>
                            <input type="text" class="form-control bg-dark text-white border-secondary" id="customerName" required>
                        </div>
                        <div class="row">
                            <div class="col-7 mb-3">
                                <label class="form-label">CPF</label>
                                <input type="text" class="form-control bg-dark text-white border-secondary" id="cpfField" required>
                            </div>
                            <div class="col-5 mb-3">
                                <label class="form-label">ASSENTO</label>
                                <input type="text" class="form-control bg-dark text-white border-secondary" id="seat" required>
                            </div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label">PAGAMENTO</label>
                            <select class="form-select bg-dark text-white border-secondary" id="paymentMethod">
                                <option value="Pix">Pix</option>
                                <option value="Cartão">Cartão</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-gold w-100">CONFIRMAR VENDA</button>
                    </form>
                </div>
            </div>
            <div class="col-lg-7">
                <div class="card bg-flow-card p-4">
                    <h5 class="mb-3">Registro de Vendas (<span id="ticketCounter">0</span>)</h5>
                    <table class="table table-flow">
                        <thead><tr><th>Comprador</th><th>Lugar</th><th>Total</th><th></th></tr></thead>
                        <tbody id="ticketList"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    <script src="scripts/flow-core.js"></script>
    <script src="scripts/flow-sales.js"></script>
</body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom border-warning">
    <div class="container">
        <a class="navbar-brand fw-bold text-warning" href="index.html">CineFlow</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="index.html">Início</a>
            <a class="nav-link" href="acervo.html">Filmes</a>
            <a class="nav-link" href="vendas.html">Vendas</a>
        </div>
    </div>
</nav>
</html>
